<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Network Fingerprinter</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <h1>Network Fingerprinter</h1>

    <table>
        <thead class="title-card">
            <tr>
                <th>IP Address</th>
                <th>MAC Address</th>
                <th>Device Type</th>
                <th>Reachability</th>
            </tr>
        </thead>
        <tbody>
            {% for device in devices %}
            <tr class="item-card">
                <td>{{ device.ip }}</td>
                <td>{{ device.mac }}</td>
                <td>{{ device.deviceType }}</td>
                <td>{{ device.reachability}}</td>
            </tr>

            
            
            {% endfor %}
        </tbody>

        
    </table>

<pre id="outputBox"></pre>

<script>

async function sendScan() {

    const commandInput = document.getElementById("targetIp");

    const command = commandInput.value;

    const outputBox = document.getElementById("outputBox");

    outputBox.textContent = "Running...";

    const resp = await fetch("/scan", {

        method: "POST",

        headers: { "Content-Type": "application/json" },

        body: JSON.stringify({ target_ip: command })

    });

    const data = await resp.json();

    console.log(data);

    outputBox.textContent = data.result;

    commandInput.value = "";

}

function handleKeyPress(event) {
    if (event.key === "Enter") {
        sendScan();
    }
}

</script>

    <div class="input-row">
        <input type="text" id="targetIp" placeholder="e.g. set 192.168.68.1, then: os" onkeypress="handleKeyPress(event)">
        <button onclick="sendScan()">Run</button>
    </div>
    
</body>
</html>
